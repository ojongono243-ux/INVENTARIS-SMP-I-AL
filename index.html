<title>DATA INVENTARIS SMPI AL MUHAJIRIN</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: auto; /* aktifkan scroll global */
    background: #fff;
}

/* WRAPPER */
.wrapper {
    width: max-content; /* ikut lebar isi */
    min-width: 100vw;
    height: 100vh;
}

/* IFRAME */
iframe {
    width: 1800px; /* paksa lebih lebar (bisa ubah 1600–2000) */
    height: 100vh;
    border: none;
    display: block;
}
</style>
</head>

<body>

<div class="wrapper">
    <iframe 
    src="https://script.google.com/macros/s/AKfycbxZues9rLYb1AD7EuT3_iGJYUKhZpANYAaB_I2zMZSwh8swn33IMRUTtXtGfhEC1s_P/exec"
    allow="clipboard-read; clipboard-write">
    </iframe>
</div>

</body>
