<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta name="viewport" 
content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>DATA INVENTARIS SMPI AL MUHAJIRIN</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    background: #ffffff;

    /* 🔥 INI PERBAIKAN UTAMA */
    overflow-x: auto; /* aktifkan scroll kanan kiri */
    overflow-y: auto;

    -webkit-overflow-scrolling: touch;
}

/* Wrapper biar iframe bisa scroll horizontal */
.iframe-container {
    width: 100%;
    overflow-x: auto;
    overflow-y: hidden;
}

/* iframe */
iframe {
    width: 100%;
    
    /* 🔥 penting: jangan pakai 100% saja */
    min-width: 1200px; /* sesuaikan dengan lebar dashboard kamu */
    
    height: 100dvh;
    border: none;
    display: block;
}
</style>
</head>

<body>

<div class="iframe-container">
    <iframe 
    src="https://script.google.com/macros/s/AKfycbypC7Ktog2Da90RHe77oFUVYEmbMMPX9j1AqDFo6Jtf1HbH_vl2Zyse26aTa3XWY3jA/exec"
    allow="clipboard-read; clipboard-write"
    title="UKS BANIN APP">
    </iframe>
</div>

</body>
</html>
