<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DATA INVENTARIS SMPI AL MUHAJIRIN</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #fff;
}

/* WRAPPER SCROLL */
.container {
    width: 100%;
    height: 100vh;
    overflow-x: auto;  /* scroll kanan */
    overflow-y: hidden;
}

/* IFRAME NORMAL (TIDAK DIPAKSA BESAR) */
iframe {
    min-width: 1200px; /* cukup lebar biar tombol kanan tidak hilang */
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}
</style>
</head>

<body>

<div class="container">
    <iframe 
    src="https://script.google.com/macros/s/AKfycbxZues9rLYb1AD7EuT3_iGJYUKhZpANYAaB_I2zMZSwh8swn33IMRUTtXtGfhEC1s_P/exec"
    allow="clipboard-read; clipboard-write">
    </iframe>
</div>

</body>
</html>
